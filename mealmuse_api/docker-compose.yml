services:

  caddy:
    image: caddy:2.0.0
    ports:
      - "80:80"
      - "443:443"
      # redirect old app to ssl
      - "8080:8080"
    volumes:
      - caddy:/data
      - $PWD/Caddyfile:/etc/caddy/Caddyfile
      - $PWD/staticfiles/:/app/static/

  recipes:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@postgres:5432/postgres
    volumes:
      - $PWD:/app
      - recipes-cache:/tmp/recipes
    expose:
      - 80
    depends_on:
      - caddy
      - postgres
    labels:
      # routinely check for new NYT recipes
      deck-chores.new-recipes.command: python manage.py scrape --urls --recipes
      deck-chores.new-recipes.interval: weekly
      # update all NYT recipes less frequently
      deck-chores.update-recipes.command: python manage.py scrape --urls --recipes --force
      deck-chores.update-recipes.interval: 30 days
      # Cookpad Kenya — fresh Kenyan recipes weekly
      deck-chores.cookpad-recipes.command: python manage.py scrape_cookpad
      deck-chores.cookpad-recipes.interval: weekly
      # Cookpad Kenya — force-refresh every 30 days
      deck-chores.cookpad-update.command: python manage.py scrape_cookpad --force
      deck-chores.cookpad-update.interval: 30 days
      # Afriyara Facebook page — scrape new posts fortnightly
      deck-chores.facebook-recipes.command: python manage.py scrape_facebook --headless --max-posts 100
      deck-chores.facebook-recipes.interval: 14 days


  postgres:
    image: postgres:17
    # NOTE: use "ports" in development
    ports:
      - "5433:5432"
    expose:
      - 5432
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres:/var/lib/postgresql/data

  deck-chores:
    image: funkyfuture/deck-chores:1.0
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      options:
        max-size: 10m

volumes:
  postgres:
  caddy:
  recipes-cache:
